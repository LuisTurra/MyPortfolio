<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script>
        // Pega o caminho atual
        const path = window.location.pathname;

        // Nome do repositório
        const repo = "/MyPortfolio";

        // Remove o nome do repo do caminho
        const projectId = path.replace(repo + "/", "");

        // Redireciona para formato #id
        window.location.replace(
            window.location.origin +
            repo +
            "/#" +
            projectId
        );
    </script>
</head>
<body>
</body>
</html>
